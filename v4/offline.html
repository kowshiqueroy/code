<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — POS</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--accent:#7c6af7;--warn:#f59e0b;--text:#e2e8f0;--muted:#64748b;--border:#2d3748}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px 32px;max-width:440px;width:100%;text-align:center}
.icon{width:72px;height:72px;background:rgba(245,158,11,.1);border:2px solid var(--warn);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px}
h1{font-size:22px;font-weight:700;margin-bottom:8px}
p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:24px}
.status{display:inline-flex;align-items:center;gap:8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--warn);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:600;margin-bottom:28px}
.dot{width:8px;height:8px;background:var(--warn);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.actions{display:flex;flex-direction:column;gap:12px}
button{width:100%;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.queue{margin-top:24px;padding:12px;background:rgba(124,106,247,.08);border:1px solid rgba(124,106,247,.2);border-radius:8px;font-size:13px;color:var(--accent);display:none}
footer{margin-top:32px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <div class="status"><span class="dot"></span>OFFLINE MODE</div>
  <h1>No Internet Connection</h1>
  <p>The POS system is running offline.<br>Sales are saved locally and will sync automatically when you reconnect.</p>
  <div class="actions">
    <button class="btn-primary" onclick="location.href='/pos.php'">Open POS Register</button>
    <button class="btn-outline" onclick="tryReconnect(this)">Try Reconnecting</button>
  </div>
  <div class="queue" id="q"><strong id="qn">0</strong> sale(s) pending sync</div>
</div>
<footer>POS Store Manager &nbsp;·&nbsp; Offline-Ready PWA</footer>
<script>
window.addEventListener('online',()=>location.href='/pos.php');
function tryReconnect(b){b.textContent='Checking…';b.disabled=true;setTimeout(()=>{if(navigator.onLine){location.href='/pos.php'}else{b.textContent='Still offline';b.disabled=false}},1500)}
(async()=>{try{const r=indexedDB.open('pos_offline',1);r.onsuccess=()=>{const db=r.result;if(!db.objectStoreNames.contains('sale_queue'))return;const c=db.transaction('sale_queue','readonly').objectStore('sale_queue').index('status').count('pending');c.onsuccess=()=>{if(c.result>0){document.getElementById('q').style.display='block';document.getElementById('qn').textContent=c.result}}}}catch(e){}})();
setInterval(()=>{if(navigator.onLine)location.href='/pos.php'},5000);
</script>
</body>
</html>
